<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rootwise — Your nature, by season</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Noto+Serif+SC:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Rootwise — calm botanical / earth palette
            canvas: '#F7F5EF', // warm paper (primary background)
            mist: '#ECEEE6', // secondary background
            parchment: '#F7F5EF', // legacy alias → warm paper
            silk: '#ECEEE6', // legacy alias → mist
            ink: '#26302B', // deep evergreen-ink (primary text)
            seal: '#5B6660', // legacy alias → stone
            stone: '#5B6660', // secondary text
            sage: '#6E8B6A', // primary accent / CTA
            'sage-deep': '#4F6B4C', // accent hover / emphasis
            gold: '#6E8B6A', // legacy alias → sage (safety net)
            'gold-light': '#4F6B4C', // legacy alias → sage-deep
            clay: '#B98A66', // warm secondary accent
            // five natural forces
            wood: '#4A6741',
            fire: '#C4664A',
            earth: '#8C7051',
            metal: '#8A8C84',
            water: '#3D5A6C',
          },
          fontFamily: {
            display: ['Fraunces', 'serif'],
            serif: ['Fraunces', 'serif'],
            sans: ['Inter', 'sans-serif'],
            sc: ['Noto Serif SC', 'serif'],
            title: ['Fraunces', 'serif'],
          },
          boxShadow: {
            // warm, soft paper-lift — depth without the app-y drop shadow
            lift: '0 6px 22px -12px rgba(38,48,43,0.16)',
            'lift-lg': '0 14px 40px -18px rgba(38,48,43,0.22)',
          },
          animation: {
            'fade-in': 'fadeIn 1.2s ease-out forwards',
            'slide-up': 'slideUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            'grow-bar': 'growBar 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards',
            'flow': 'flow 10s linear infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(40px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            growBar: {
              '0%': { height: '0%' },
              '100%': { height: 'var(--target-height)' },
            },
            flow: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    .mask-fade {
      mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
    }

    .vertical-text {
      writing-mode: vertical-rl;
      text-orientation: upright;
    }

    /* Custom Scrollbar for panels */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #F7F5F0;
    }

    ::-webkit-scrollbar-thumb {
      background: #D1CFC8;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #6E8B6A;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "tyme4ts": "https://aistudiocdn.com/tyme4ts@^1.3.9"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body
  class="bg-canvas text-ink font-sans antialiased selection:bg-sage selection:text-white overflow-x-hidden min-h-screen">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
